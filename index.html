<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Terminal 🎉</title>

<style>
body {
    margin: 0;
    background: #0a0a0a;
    color: #00ffcc;
    font-family: "Courier New", monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

/* Matrix canvas */
#matrix {
    position: absolute;
    top: 0;
    left: 0;
    z-index: 0;
}

/* Terminal */
.terminal {
    position: relative;
    z-index: 1;
    width: 90%;
    max-width: 600px;
    background: rgba(17,17,17,0.9);
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 0 20px rgba(0,255,200,0.2);
}

/* Title glitch */
h1 {
    position: relative;
    color: #00ffcc;
}

h1::after {
    content: attr(data-text);
    position: absolute;
    left: 2px;
    top: 0;
    color: red;
    opacity: 0.3;
}

/* Button */
button {
    background: transparent;
    border: 1px solid #00ffcc;
    color: #00ffcc;
    padding: 10px 20px;
    cursor: pointer;
    margin-top: 20px;
}

/* Hidden */
#countdown, #content {
    display: none;
}

/* Typing */
#typing {
    margin-top: 20px;
    line-height: 1.5;
    border-right: 2px solid #00ffcc;
    padding-right: 5px;
    animation: blink 1s infinite;
}

@keyframes blink {
    50% { border-color: transparent; }
}

/* Music */
.music {
    position: absolute;
    top: 20px;
    right: 20px;
    color: #00ffcc;
    cursor: pointer;
    z-index: 2;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="music" onclick="toggleMusic()">[ music ]</div>

<audio id="bgMusic" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-sunny.mp3">
</audio>

<div class="terminal" id="start">
    <p id="boot"></p>
    <button onclick="startCountdown()">[ EXECUTE ]</button>
</div>

<div class="terminal" id="countdown">
    <h1 id="count">3</h1>
</div>

<div class="terminal" id="content">
    <h1 data-text="> Happy Birthday Susanna 🎂">
        > Happy Birthday Susanna 🎂
    </h1>
    <p id="typing"></p>
    <p style="opacity:0.6; margin-top:20px;">> from praveen</p>
</div>

<script>
// Matrix effect
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

let letters = "01".split("");
let fontSize = 14;
let columns = canvas.width / fontSize;
let drops = [];

for (let i = 0; i < columns; i++) drops[i] = 1;

function drawMatrix() {
    ctx.fillStyle = "rgba(0,0,0,0.05)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#00ffcc";
    ctx.font = fontSize + "px monospace";

    for (let i = 0; i < drops.length; i++) {
        let text = letters[Math.floor(Math.random() * letters.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975)
            drops[i] = 0;

        drops[i]++;
    }
}
setInterval(drawMatrix, 35);

// Boot text
const bootText = [
"> booting system...",
"> connecting to server...",
"> locating Susanna...",
"> access granted ✅"
];

let line = 0;

function typeBoot() {
    if (line < bootText.length) {
        document.getElementById("boot").innerHTML += bootText[line] + "<br>";
        line++;
        setTimeout(typeBoot, 500);
    }
}
typeBoot();

// Countdown
function startCountdown() {
    document.getElementById("start").style.display = "none";
    document.getElementById("countdown").style.display = "block";

    let count = 3;
    let interval = setInterval(() => {
        count--;
        document.getElementById("count").innerText = count;

        if (count === 0) {
            clearInterval(interval);
            document.getElementById("countdown").style.display = "none";
            document.getElementById("content").style.display = "block";
            startTyping();
        }
    }, 1000);
}

// Typing message
const message = "> Not just another year...\n> but another chapter of your story.\n> stay rare. stay real. stay you. ❤️";
let i = 0;

function startTyping() {
    let typing = document.getElementById("typing");
    let interval = setInterval(() => {
        typing.innerHTML += message.charAt(i);
        i++;
        if (i >= message.length) clearInterval(interval);
    }, 40);
}

// Music
function toggleMusic() {
    let music = document.getElementById("bgMusic");
    if (music.paused) music.play();
    else music.pause();
}
</script>

</body>
</html>
